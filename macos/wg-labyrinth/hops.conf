# wg-labyrinth topology and behavior.
# This file is sourced by the labyrinth CLI; edit values to retune.
# A 3-hop chain on macOS: Mac → middle container → exit container → internet.

# --- image / network ---
LABYRINTH_IMAGE_TAG="labyrinth/alpine-wg:local"
LABYRINTH_NETWORK_NAME="labyrinth-net"
LABYRINTH_SUBNET="172.30.0.0/24"

# --- container bridge IPs ---
LABYRINTH_MIDDLE_BRIDGE_IP="172.30.0.20"
LABYRINTH_EXIT_BRIDGE_IP="172.30.0.30"

# --- wg-side IPs (host) and subnets (/24 network address) ---
LABYRINTH_MAC_WG_IP="10.0.1.1"
LABYRINTH_MAC_WG_NET="10.0.1.0/24"
LABYRINTH_MIDDLE_WG_IP="10.0.2.1"
LABYRINTH_MIDDLE_WG_NET="10.0.2.0/24"
LABYRINTH_EXIT_WG_IP="10.0.3.1"
LABYRINTH_EXIT_WG_NET="10.0.3.0/24"

# --- listen ports ---
# Middle's UDP port is published to Mac's 127.0.0.1. If you already run another
# WireGuard (Tailscale, Netbird, WireGuard.app, mullvad), the canonical 51820
# is taken. Picked 51840 to dodge that. Change if you have your own conflicts.
LABYRINTH_MIDDLE_PORT="51840"   # published to Mac 127.0.0.1
LABYRINTH_EXIT_PORT="51841"     # bridge-internal only

# --- Mac wg interface (utun) config name ---
# Resulting Mac config will be at $STATE_DIR/rendered/${LABYRINTH_MAC_IF}.conf
# wg-quick on macOS picks a utun<N> at runtime; this is the config name.
LABYRINTH_MAC_IF="labyrinth"

# --- selectivity ---
# all         : kill-switch mode, AllowedIPs=0.0.0.0/0 on Mac side, all traffic via chain
# destinations: only LABYRINTH_SELECTIVE_DESTS go via chain
# off         : Mac config disabled at up; chain containers still run for testing via docker exec
LABYRINTH_SELECTIVITY="off"
LABYRINTH_SELECTIVE_DESTS="1.1.1.1/32"

# --- behavior ---
LABYRINTH_VERIFY_ON_UP="true"
LABYRINTH_PERSISTENT_KEEPALIVE="25"
